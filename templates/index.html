<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tessera</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; }
        .mono { font-family: 'Geist Mono', monospace; }
        .grid-bg {
            background-image: linear-gradient(to right, #111111 1px, transparent 1px), linear-gradient(to bottom, #111111 1px, transparent 1px);
            background-size: 24px 24px;
        }
        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #222222; }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col items-center antialiased px-4 py-6 md:p-12 relative overflow-x-hidden grid-bg">

    <header class="w-full max-w-5xl border border-[#1c1c1c] bg-black/90 backdrop-blur-md p-5 mb-6 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 shadow-2xl">
        <div class="flex items-center gap-3">
            <div class="h-1.5 w-1.5 bg-white animate-pulse"></div>
            <h1 class="text-xs font-semibold tracking-widest uppercase mono">tessera</h1>
        </div>
        <div class="text-[10px] mono text-neutral-400 flex flex-wrap gap-x-6 gap-y-1 w-full sm:w-auto justify-between sm:justify-end">
            <div>NODE // <span class="text-white font-medium">LOQ</span></div>
            <div>ADDR // <span class="text-white font-medium" id="node-ip">0.0.0.0</span></div>
        </div>
    </header>

    <main class="w-full max-w-5xl grid grid-cols-1 lg:grid-cols-3 gap-6 items-start">
        
        <div class="lg:col-span-2 space-y-6">
            
            <section class="border border-[#1c1c1c] p-5 bg-black/95 shadow-xl">
                <h2 class="text-[11px] font-medium uppercase tracking-widest text-neutral-400 mb-4 mono">// CONNECTED DEVICES</h2>
                <div id="peers-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-2 min-h-[50px]">
                    <p class="text-xs text-neutral-600 italic mono py-1">Searching...</p>
                </div>
            </section>
            
            <section class="border border-[#1c1c1c] p-5 bg-black/95 shadow-xl">
                <h2 class="text-[11px] font-medium uppercase tracking-widest text-neutral-400 mb-3 mono">// CLIPBOARD SYNC</h2>
                <textarea id="clipboard-input" rows="3" class="w-full p-4 bg-[#0a0a0a] border border-[#1c1c1c] focus:border-neutral-500 rounded-none focus:outline-none text-xs text-neutral-300 placeholder-neutral-700 mono resize-none transition-colors duration-150 focus:ring-0" placeholder="Paste data here..."></textarea>
                <button type="button" id="sync-text-btn" class="w-full mt-3 bg-white hover:bg-neutral-200 active:bg-neutral-300 text-black font-semibold py-3.5 px-4 text-[10px] mono transition duration-100 rounded-none uppercase tracking-widest cursor-pointer">
                    push text
                </button>
            </section>

            <section class="border border-[#1c1c1c] p-5 bg-black/95 shadow-xl">
                <h2 class="text-[11px] font-medium uppercase tracking-widest text-neutral-400 mb-3 mono">// FILE TRANSFER</h2>
                <div id="drop-zone" class="border border-dashed border-[#2c2c2c] hover:border-neutral-500 p-10 text-center cursor-pointer bg-[#070707] transition duration-150 flex flex-col items-center justify-center min-h-[140px] hover:bg-[#0c0c0c]">
                    <input type="file" id="file-element" class="hidden">
                    <p class="text-xs text-neutral-300 mono tracking-widest font-medium">SELECT FILE SOURCE</p>
                </div>
                
                <div id="progress-container" class="mt-4 hidden bg-[#0a0a0a] border border-[#1c1c1c] p-3.5">
                    <div class="flex justify-between text-[10px] mono mb-2">
                        <span id="status-text" class="text-neutral-500 uppercase tracking-wider">Sending...</span>
                        <span id="progress-percent" class="text-white font-bold">0%</span>
                    </div>
                    <div class="w-full bg-neutral-900 h-[1px] overflow-hidden">
                        <div id="progress-bar" class="bg-white h-full w-0 transition-all duration-150"></div>
                    </div>
                </div>
            </section>
        </div>

        <div class="lg:col-span-1 w-full">
            <section class="border border-[#1c1c1c] p-5 bg-black/95 shadow-xl flex flex-col min-h-[350px] lg:min-h-[515px]">
                <div class="flex justify-between items-baseline mb-4 pb-2 border-b border-[#1c1c1c]">
                    <h2 class="text-[11px] font-medium uppercase tracking-widest text-neutral-400 mono">// HISTORY</h2>
                    <div class="flex gap-3">
                        <button type="button" id="clear-files-btn" class="text-[9px] mono text-neutral-600 hover:text-rose-400 transition uppercase tracking-widest cursor-pointer font-medium">clear</button>
                        <button type="button" id="refresh-files-btn" class="text-[9px] mono text-neutral-500 hover:text-white transition uppercase tracking-widest cursor-pointer font-medium">sync</button>
                    </div>
                </div>
                <div id="files-list" class="space-y-2 overflow-y-auto pr-1 flex-1 text-xs mono custom-scroll max-h-[380px] lg:max-h-none">
                    <p class="text-[10px] text-neutral-600 italic py-1">Indexing...</p>
                </div>
            </section>
        </div>

    </main>

    <div id="toast" class="fixed bottom-6 text-[10px] mono uppercase tracking-widest font-medium px-5 py-3 bg-neutral-900 border border-[#2c2c2c] text-white shadow-2xl translate-y-20 opacity-0 transition-all duration-200 z-50"></div>

    <script src="/static/js/main.js?v={{ version }}"></script>
</body>
</html>
