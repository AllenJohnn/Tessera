<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tessera</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .mono { font-family: 'Geist Mono', monospace; }
        /* Ultra-sharp minimal border layout styling */
        .border-main { border-color: #222222; }
    </style>
</head>
<body class="bg-black text-white min-h-screen flex flex-col items-center antialiased p-6">
    
    <header class="w-full max-w-4xl border-b border-[#222222] pb-4 mb-8 flex justify-between items-baseline">
        <div class="flex items-baseline gap-2">
            <h1 class="text-lg font-semibold tracking-tight">tessera</h1>
            <span class="text-[10px] mono text-neutral-500 uppercase">lan.sync</span>
        </div>
        <div class="text-[11px] mono text-neutral-400 flex gap-4">
            <div>node: <span class="text-white">LOQ</span></div>
            <div>ip: <span class="text-white" id="node-ip">0.0.0.0</span></div>
        </div>
    </header>

    <main class="w-full max-w-4xl grid grid-cols-1 md:grid-cols-3 gap-8 items-start">
        
        <div class="md:col-span-2 space-y-8">
            
            <section class="border border-[#222222] p-5 bg-neutral-950/40">
                <h2 class="text-xs font-semibold uppercase tracking-wider text-neutral-400 mb-3">active devices</h2>
                <div id="peers-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-2">
                    <p class="text-xs text-neutral-600 italic mono">Scanning network...</p>
                </div>
            </section>
            
            <section class="border border-[#222222] p-5 bg-neutral-950/40">
                <h2 class="text-xs font-semibold uppercase tracking-wider text-neutral-400 mb-3">clipboard sync</h2>
                <textarea id="clipboard-input" rows="3" class="w-full p-3 bg-black border border-[#222222] focus:border-neutral-500 rounded-none focus:outline-none text-xs text-neutral-200 placeholder-neutral-700 mono resize-none" placeholder="Paste data to send to host PC..."></textarea>
                <button type="button" id="sync-text-btn" class="w-full mt-3 bg-white hover:bg-neutral-200 text-black font-medium py-2 px-4 text-xs transition duration-150 rounded-none uppercase tracking-wider cursor-pointer">
                    push text
                </button>
            </section>

            <section class="border border-[#222222] p-5 bg-neutral-950/40">
                <h2 class="text-xs font-semibold uppercase tracking-wider text-neutral-400 mb-3">file transfer</h2>
                <div id="drop-zone" class="border border-dashed border-[#333333] hover:border-neutral-500 p-8 text-center cursor-pointer bg-neutral-950/20 transition duration-150">
                    <input type="file" id="file-element" class="hidden">
                    <p class="text-xs text-neutral-400">Select file source to stream</p>
                </div>
                
                <div id="progress-container" class="mt-4 hidden bg-black border border-[#222222] p-3">
                    <div class="flex justify-between text-[11px] mono mb-1.5">
                        <span id="status-text" class="text-neutral-400">Uploading...</span>
                        <span id="progress-percent" class="text-white font-bold">0%</span>
                    </div>
                    <div class="w-full bg-neutral-900 h-1 overflow-hidden">
                        <div id="progress-bar" class="bg-white h-full w-0 transition-all duration-150"></div>
                    </div>
                </div>
            </section>
        </div>

        <div class="md:col-span-1">
            <section class="border border-[#222222] p-5 bg-neutral-950/40 flex flex-col min-h-[460px]">
                <div class="flex justify-between items-baseline mb-4 pb-2 border-b border-[#222222]">
                    <h2 class="text-xs font-semibold uppercase tracking-wider text-neutral-400">history log</h2>
                    <button id="refresh-history-btn" class="text-[10px] mono text-neutral-500 hover:text-white transition uppercase cursor-pointer">refresh</button>
                </div>
                <div id="history-list" class="space-y-2 overflow-y-auto pr-1 flex-1 text-xs mono">
                </div>
            </section>
        </div>

<div class="md:col-span-1 space-y-8">
            <section class="border border-[#222222] p-5 bg-neutral-950/40 flex flex-col min-h-[220px]">
                <div class="flex justify-between items-baseline mb-4 pb-2 border-b border-[#222222]">
                    <h2 class="text-xs font-semibold uppercase tracking-wider text-neutral-400">history log</h2>
                    <button id="refresh-history-btn" class="text-[10px] mono text-neutral-500 hover:text-white transition uppercase cursor-pointer">refresh</button>
                </div>
                <div id="history-list" class="space-y-2 overflow-y-auto pr-1 flex-1 text-xs mono"></div>
            </section>

            <section class="border border-[#222222] p-5 bg-neutral-950/40 flex flex-col min-h-[220px]">
                <div class="flex justify-between items-baseline mb-4 pb-2 border-b border-[#222222]">
                    <h2 class="text-xs font-semibold uppercase tracking-wider text-neutral-400">available files</h2>
                    <button id="refresh-files-btn" class="text-[10px] mono text-neutral-500 hover:text-white transition uppercase cursor-pointer">scan</button>
                </div>
                <div id="files-list" class="space-y-2 overflow-y-auto pr-1 flex-1 text-xs mono">
                    </div>
            </section>
        </div>

    </main>

    <div id="toast" class="fixed bottom-6 text-xs uppercase tracking-wider font-medium px-4 py-2 bg-neutral-900 border border-[#333333] text-white shadow-2xl translate-y-20 opacity-0 transition-all duration-200"></div>

    <script src="/static/js/main.js?v={{ version }}"></script>
</body>
</html>
